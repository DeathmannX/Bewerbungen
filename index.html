<!DOCTYPE html>
<html lang="de" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bewerbungs-Manager | Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: { 
                        brand: {
                            bg: '#050505',
                            card: '#0d0d0d',
                            border: '#1a1a1a',
                            muted: '#888888',
                            accent: '#ffffff'
                        }
                    }
                }
            }
        }
    </script>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');
        body { 
            background-color: #050505; 
            color: #e5e5e5; 
            font-family: 'Inter', sans-serif;
            -webkit-font-smoothing: antialiased;
        }
        .glass-card { 
            background: #0d0d0d; 
            border: 1px solid #1a1a1a; 
            transition: all 0.2s ease-in-out;
        }
        .glass-card:hover {
            border-color: #333;
            background: #111;
        }
        .status-indicator {
            width: 4px;
            height: 100%;
            position: absolute;
            left: 0;
            top: 0;
            border-radius: 4px 0 0 4px;
        }
        .btn-premium {
            background: #ffffff;
            color: #000000;
            font-weight: 600;
            transition: opacity 0.2s;
        }
        .btn-premium:hover { opacity: 0.9; }
        .input-premium {
            background: #0d0d0d;
            border: 1px solid #1a1a1a;
            color: #fff;
        }
        .input-premium:focus { border-color: #444; outline: none; }
        
        [data-lucide] {
            stroke: currentColor;
            color: #a3a3a3;
        }
        
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: #050505; }
        ::-webkit-scrollbar-thumb { background: #1a1a1a; border-radius: 4px; }
    </style>
</head>
<body>
    <div id="root"></div>
    <script type="text/babel">
        const { useState, useEffect, useMemo } = React;

        const Icon = ({ name, size = 16, className = "" }) => {
            useEffect(() => { if (window.lucide) window.lucide.createIcons(); }, [name]);
            return <i data-lucide={name} style={{width: size, height: size}} className={className}></i>;
        };

        const PlatformLink = ({ value }) => {
            if (!value) return <span className="text-brand-muted italic">Direktbewerbung</span>;
            const isUrl = value.match(/^(https?:\/\/|www\.)[^\s]+/i);
            const href = value.startsWith('www.') ? `https://${value}` : value;
            
            if (isUrl) {
                return (
                    <a href={href} target="_blank" rel="noopener noreferrer" className="text-blue-400 hover:underline flex items-center gap-1">
                        {value.length > 25 ? value.substring(0, 25) + '...' : value}
                        <Icon name="external-link" size={12} className="text-blue-400" />
                    </a>
                );
            }
            return <span>{value}</span>;
        };

        const pad2 = (n) => String(n).padStart(2, '0');

        const isValidIsoDate = (value) => {
            if (typeof value !== 'string' || !/^\d{4}-\d{2}-\d{2}$/.test(value)) return false;
            const [y, m, d] = value.split('-').map(Number);
            const dt = new Date(y, m - 1, d);
            return dt.getFullYear() === y && (dt.getMonth() + 1) === m && dt.getDate() === d;
        };

        const formatIsoDateGerman = (value) => {
            if (!isValidIsoDate(value)) return null;
            const [y, m, d] = value.split('-').map(Number);
            return new Date(y, m - 1, d).toLocaleDateString('de-DE');
        };

        const historyTimestampToIso = (value) => {
            if (typeof value !== 'string') return null;
            const match = value.match(/^(\d{2})\.(\d{2})\.(\d{4})(?:\s+\d{2}:\d{2})?/);
            if (!match) return null;
            const iso = `${match[3]}-${match[2]}-${match[1]}`;
            return isValidIsoDate(iso) ? iso : null;
        };

        const escapeIcsText = (value) => String(value || "")
            .replace(/\\/g, "\\\\")
            .replace(/\r?\n/g, "\\n")
            .replace(/,/g, "\\,")
            .replace(/;/g, "\\;");

        const isoToIcsDate = (isoDate) => isoDate.replace(/-/g, "");

        const nextIsoDate = (isoDate) => {
            if (!isValidIsoDate(isoDate)) return null;
            const [y, m, d] = isoDate.split('-').map(Number);
            const next = new Date(y, m - 1, d + 1);
            return `${next.getFullYear()}-${pad2(next.getMonth() + 1)}-${pad2(next.getDate())}`;
        };

        const sanitizeFilePart = (value) => String(value || "")
            .replace(/[^A-Za-z0-9._-]/g, "_")
            .slice(0, 50) || "termin";

        const calendarDayClass = (isSelected, isToday, eventCount) => {
            if (isSelected) return "border-white bg-white/10 text-white";
            if (isToday) return "border-blue-500/80 bg-blue-500/10 text-blue-300";
            if (eventCount > 0) return "border-brand-border bg-white/5 text-white hover:border-white/40";
            return "border-brand-border text-brand-muted hover:text-white hover:border-white/20";
        };

        function App() {
            const [apps, setApps] = useState([]);
            const [isModalOpen, setIsModalOpen] = useState(false);
            const [isHistoryOpen, setIsHistoryOpen] = useState(false);
            const [editingApp, setEditingApp] = useState(null);
            const [historyApp, setHistoryApp] = useState(null);
            const [dateFrom, setDateFrom] = useState('');
            const [dateTo, setDateTo] = useState('');
            const [statusFilter, setStatusFilter] = useState('alle');
            const [activePage, setActivePage] = useState('dashboard');
            const [calendarMonth, setCalendarMonth] = useState(() => {
                const now = new Date();
                return new Date(now.getFullYear(), now.getMonth(), 1);
            });
            const [selectedCalendarDate, setSelectedCalendarDate] = useState(() => new Date().toISOString().split('T')[0]);

            const API_BASE = "/api";
            const todayIso = new Date().toISOString().split('T')[0];

            useEffect(() => { fetchData(); }, []);
            const fetchData = async () => {
                try {
                    const res = await fetch(`${API_BASE}/applications`);
                    const data = await res.json();
                    setApps(data);
                } catch (err) { console.error(err); }
            };

            const saveApp = async (formData) => {
                const method = formData.id ? "PUT" : "POST";
                const url = formData.id ? `${API_BASE}/applications/${formData.id}` : `${API_BASE}/applications`;
                try {
                    await fetch(url, {
                        method,
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify(formData)
                    });
                    fetchData();
                    setIsModalOpen(false);
                    setEditingApp(null);
                } catch (err) { alert("Speichern fehlgeschlagen"); }
            };

            const deleteApp = async (id) => {
                if (!confirm("Eintrag unwiderruflich löschen?")) return;
                await fetch(`${API_BASE}/applications/${id}`, { method: "DELETE" });
                fetchData();
            };

            const filteredApps = useMemo(() => {
                return apps.filter(app => {
                    const appDate = app.dateApplied;
                    if (dateFrom && appDate < dateFrom) return false;
                    if (dateTo && appDate > dateTo) return false;
                    if (statusFilter !== 'alle' && app.status !== statusFilter) return false;
                    return true;
                }).sort((a, b) => b.dateApplied.localeCompare(a.dateApplied));
            }, [apps, dateFrom, dateTo, statusFilter]);

            const exportTxt = () => {
                let txt = "BEWERBUNGSLISTE - EXPORT\n" + "=".repeat(40) + "\n\n";
                filteredApps.forEach(a => {
                    txt += `DATUM: ${a.dateApplied}\nFIRMA: ${a.company}\nSTELLE: ${a.jobTitle}\nSTATUS: ${a.status.toUpperCase()}\nGEHALT: ${a.salary || '-'}\n`;
                    const appointmentDate = a.status === 'gemeldet' ? formatIsoDateGerman(a.statusDate) : null;
                    if (appointmentDate) {
                        txt += `TERMIN: ${appointmentDate}\n`;
                    }
                    if (a.history && a.history.length > 0) {
                        txt += "VERLAUF:\n";
                        a.history.forEach(h => txt += `  - [${h.timestamp}] ${h.event}\n`);
                    }
                    txt += "-".repeat(40) + "\n";
                });

                const appointmentRows = filteredApps
                    .filter(a => a.status === 'gemeldet' && isValidIsoDate(a.statusDate))
                    .sort((a, b) => a.statusDate.localeCompare(b.statusDate));

                if (appointmentRows.length > 0) {
                    txt += "\nTERMINE RUECKMELDUNG\n" + "=".repeat(40) + "\n";
                    appointmentRows.forEach(a => {
                        txt += `${formatIsoDateGerman(a.statusDate)} | ${a.company} | ${a.jobTitle}\n`;
                    });
                }

                const blob = new Blob([txt], {type: 'text/plain'});
                const url = URL.createObjectURL(blob);
                const link = document.createElement('a');
                link.href = url;
                link.download = `bewerbungen_${new Date().toISOString().split('T')[0]}.txt`;
                link.click();
            };

            const exportAppointmentToIcs = ({ isoDate, company, jobTitle, statusDetail, statusText }) => {
                if (!isValidIsoDate(isoDate)) {
                    alert("Termin konnte nicht exportiert werden: Ungültiges Datum.");
                    return;
                }

                const nextDate = nextIsoDate(isoDate);
                const dtStart = isoToIcsDate(isoDate);
                const dtEnd = isoToIcsDate(nextDate);
                const dtStamp = new Date().toISOString().replace(/[-:]/g, "").split(".")[0] + "Z";
                const uid = `${Date.now()}-${Math.random().toString(36).slice(2)}@bewerbungsmanager.local`;
                const summary = `Rückmeldung: ${jobTitle} - ${company}`;
                const descriptionLines = [
                    `Firma: ${company}`,
                    `Stelle: ${jobTitle}`,
                    statusDetail ? `Art: ${statusDetail}` : "",
                    statusText ? `Notiz: ${statusText}` : ""
                ].filter(Boolean);

                const ics = [
                    "BEGIN:VCALENDAR",
                    "VERSION:2.0",
                    "PRODID:-//Bewerbungs-Manager//DE",
                    "CALSCALE:GREGORIAN",
                    "BEGIN:VEVENT",
                    `UID:${uid}`,
                    `DTSTAMP:${dtStamp}`,
                    `DTSTART;VALUE=DATE:${dtStart}`,
                    `DTEND;VALUE=DATE:${dtEnd}`,
                    `SUMMARY:${escapeIcsText(summary)}`,
                    `DESCRIPTION:${escapeIcsText(descriptionLines.join("\n"))}`,
                    "END:VEVENT",
                    "END:VCALENDAR"
                ].join("\r\n");

                const blob = new Blob([ics], { type: "text/calendar;charset=utf-8" });
                const url = URL.createObjectURL(blob);
                const link = document.createElement("a");
                link.href = url;
                link.download = `termin_${sanitizeFilePart(company)}_${sanitizeFilePart(jobTitle)}_${isoDate}.ics`;
                link.click();
                setTimeout(() => URL.revokeObjectURL(url), 500);
            };

            const calendarEvents = useMemo(() => {
                const eventMap = {};
                const pushEvent = (isoDate, event) => {
                    if (!isValidIsoDate(isoDate)) return;
                    if (!eventMap[isoDate]) eventMap[isoDate] = [];
                    eventMap[isoDate].push(event);
                };

                apps.forEach(app => {
                    const historyEntries = Array.isArray(app.history) ? app.history : [];
                    let hasCreationEvent = false;

                    historyEntries.forEach(entry => {
                        const eventDate = historyTimestampToIso(entry.timestamp);
                        if (!eventDate) return;

                        const text = entry.event || "Änderung";
                        const isCreation = text.toLowerCase().includes("bewerbung erstellt");
                        if (isCreation) hasCreationEvent = true;

                        pushEvent(eventDate, {
                            type: isCreation ? "created" : "change",
                            title: text,
                            company: app.company,
                            jobTitle: app.jobTitle
                        });
                    });

                    if (!hasCreationEvent && isValidIsoDate(app.dateApplied)) {
                        pushEvent(app.dateApplied, {
                            type: "created",
                            title: "Bewerbung erstellt",
                            company: app.company,
                            jobTitle: app.jobTitle
                        });
                    }

                    if (app.status === 'gemeldet' && isValidIsoDate(app.statusDate)) {
                        pushEvent(app.statusDate, {
                            type: "appointment",
                            title: "Rückmeldung / Termin",
                            company: app.company,
                            jobTitle: app.jobTitle,
                            statusDate: app.statusDate,
                            statusDetail: app.statusDetail || "",
                            statusText: app.statusText || ""
                        });
                    }
                });

                Object.keys(eventMap).forEach(dateKey => {
                    eventMap[dateKey].sort((a, b) => {
                        const priority = { appointment: 0, created: 1, change: 2 };
                        return (priority[a.type] ?? 99) - (priority[b.type] ?? 99);
                    });
                });

                return eventMap;
            }, [apps]);

            const calendarCells = useMemo(() => {
                const year = calendarMonth.getFullYear();
                const month = calendarMonth.getMonth();
                const firstDayIndex = (new Date(year, month, 1).getDay() + 6) % 7;
                const daysInMonth = new Date(year, month + 1, 0).getDate();
                const cells = [];

                for (let i = 0; i < firstDayIndex; i++) cells.push(null);
                for (let day = 1; day <= daysInMonth; day++) {
                    cells.push({
                        day,
                        isoDate: `${year}-${pad2(month + 1)}-${pad2(day)}`
                    });
                }
                return cells;
            }, [calendarMonth]);

            const selectedDayEvents = calendarEvents[selectedCalendarDate] || [];
            const calendarLabel = calendarMonth.toLocaleDateString('de-DE', { month: 'long', year: 'numeric' });

            return (
                <div className="max-w-5xl mx-auto px-4 py-12 md:py-20">
                    <div className="glass-card p-2 rounded-lg mb-8 flex items-center gap-2 w-fit">
                        <button
                            onClick={() => setActivePage('dashboard')}
                            className={`px-4 py-2 rounded text-xs uppercase tracking-wide ${activePage === 'dashboard' ? 'btn-premium' : 'hover:bg-white/5'}`}
                        >
                            Dashboard
                        </button>
                        <button
                            onClick={() => setActivePage('cover-letter')}
                            className={`px-4 py-2 rounded text-xs uppercase tracking-wide ${activePage === 'cover-letter' ? 'btn-premium' : 'hover:bg-white/5'}`}
                        >
                            KI Anschreiben
                        </button>
                    </div>

                    {activePage === 'dashboard' ? (
                    <>
                    <header className="flex flex-col md:flex-row justify-between items-start md:items-center gap-8 mb-16">
                        <div>
                            <h1 className="text-3xl font-bold tracking-tight text-white mb-2 italic uppercase">Bewerbungs-Manager</h1>
                            <div className="flex items-center gap-2 text-brand-muted text-sm">
                                <div className="w-2 h-2 rounded-full bg-green-500 animate-pulse"></div>
                                System aktiv • {filteredApps.length} Einträge im Zeitraum
                            </div>
                        </div>
                        <div className="flex gap-3">
                            <button onClick={exportTxt} className="glass-card px-5 py-2.5 rounded text-sm font-medium flex items-center gap-2 hover:bg-white/5 transition-colors">
                                <Icon name="file-text" /> Export
                            </button>
                            <button onClick={() => { setEditingApp(null); setIsModalOpen(true); }} className="btn-premium px-6 py-2.5 rounded text-sm flex items-center gap-2">
                                <Icon name="plus" /> Neuer Eintrag
                            </button>
                        </div>
                    </header>

                    <div className="glass-card p-2 rounded-lg mb-10 flex flex-wrap items-center gap-4">
                        <div className="flex items-center gap-2 px-3 py-1.5 border-r border-brand-border">
                            <Icon name="filter" size={14} className="text-brand-muted" />
                            <select value={statusFilter} onChange={e => setStatusFilter(e.target.value)} className="bg-transparent text-sm focus:outline-none cursor-pointer">
                                <option value="alle">Alle Status</option>
                                <option value="offen">Offen</option>
                                <option value="gemeldet">Rückmeldung</option>
                                <option value="absage">Absage</option>
                            </select>
                        </div>
                        <div className="flex items-center gap-3 px-3">
                            <input type="date" value={dateFrom} onChange={e => setDateFrom(e.target.value)} className="bg-transparent text-sm focus:outline-none invert dark:invert-0" />
                            <span className="text-brand-muted text-[10px] font-bold">BIS</span>
                            <input type="date" value={dateTo} onChange={e => setDateTo(e.target.value)} className="bg-transparent text-sm focus:outline-none invert dark:invert-0" />
                        </div>
                    </div>

                    <section className="glass-card p-6 md:p-8 rounded-lg mb-10">
                        <div className="flex flex-col md:flex-row md:items-center md:justify-between gap-4 mb-6">
                            <h2 className="text-sm font-bold uppercase tracking-widest text-brand-muted flex items-center gap-2">
                                <Icon name="calendar-days" size={16} /> Bewerbungs-Kalender
                            </h2>
                            <div className="flex items-center gap-3">
                                <button
                                    onClick={() => setCalendarMonth(prev => new Date(prev.getFullYear(), prev.getMonth() - 1, 1))}
                                    className="p-2 rounded border border-brand-border hover:border-white/40"
                                    title="Vorheriger Monat"
                                >
                                    <Icon name="chevron-left" size={16} />
                                </button>
                                <span className="text-sm uppercase tracking-wider min-w-[180px] text-center">{calendarLabel}</span>
                                <button
                                    onClick={() => setCalendarMonth(prev => new Date(prev.getFullYear(), prev.getMonth() + 1, 1))}
                                    className="p-2 rounded border border-brand-border hover:border-white/40"
                                    title="Nächster Monat"
                                >
                                    <Icon name="chevron-right" size={16} />
                                </button>
                            </div>
                        </div>

                        <div className="grid grid-cols-7 gap-2 mb-2 text-[10px] uppercase tracking-widest text-brand-muted">
                            {["Mo", "Di", "Mi", "Do", "Fr", "Sa", "So"].map(day => (
                                <div key={day} className="text-center">{day}</div>
                            ))}
                        </div>

                        <div className="grid grid-cols-7 gap-2 mb-6">
                            {calendarCells.map((cell, idx) => {
                                if (!cell) return <div key={`empty-${idx}`} className="h-16 rounded border border-transparent"></div>;
                                const events = calendarEvents[cell.isoDate] || [];
                                const isSelected = selectedCalendarDate === cell.isoDate;
                                const isToday = todayIso === cell.isoDate;
                                return (
                                    <button
                                        key={cell.isoDate}
                                        onClick={() => setSelectedCalendarDate(cell.isoDate)}
                                        className={`h-16 rounded border transition-colors p-2 ${calendarDayClass(isSelected, isToday, events.length)}`}
                                    >
                                        <div className="text-xs font-bold">{cell.day}</div>
                                        {events.length > 0 && (
                                            <div className="text-[10px] mt-1">{events.length} Event{events.length > 1 ? 's' : ''}</div>
                                        )}
                                    </button>
                                );
                            })}
                        </div>

                        <div className="border-t border-brand-border pt-4">
                            <div className="text-xs uppercase tracking-widest text-brand-muted mb-3">
                                Ereignisse am {formatIsoDateGerman(selectedCalendarDate) || selectedCalendarDate}
                            </div>
                            {selectedDayEvents.length === 0 ? (
                                <div className="text-sm text-brand-muted italic">Keine Einträge für diesen Tag.</div>
                            ) : (
                                <div className="space-y-2">
                                    {selectedDayEvents.map((event, idx) => (
                                        <div key={`${event.type}-${idx}`} className="p-3 rounded border border-brand-border bg-white/5">
                                            <div className="flex items-center gap-2 mb-1">
                                                <span className={`text-[10px] font-bold uppercase px-2 py-0.5 rounded ${
                                                    event.type === 'appointment' ? 'bg-yellow-500/10 text-yellow-400' :
                                                    event.type === 'created' ? 'bg-green-500/10 text-green-400' :
                                                    'bg-blue-500/10 text-blue-400'
                                                }`}>
                                                    {event.type === 'appointment' ? 'Termin' : event.type === 'created' ? 'Erstellt' : 'Änderung'}
                                                </span>
                                                <span className="text-xs text-brand-accent/80">{event.title}</span>
                                            </div>
                                            <div className="text-sm text-white">{event.company}</div>
                                            <div className="text-xs text-brand-muted">{event.jobTitle}</div>
                                            {event.type === 'appointment' && (
                                                <button
                                                    onClick={() => exportAppointmentToIcs({
                                                        isoDate: selectedCalendarDate,
                                                        company: event.company,
                                                        jobTitle: event.jobTitle,
                                                        statusDetail: event.statusDetail,
                                                        statusText: event.statusText
                                                    })}
                                                    className="mt-2 inline-flex items-center gap-1 text-[10px] uppercase tracking-wide border border-brand-border rounded px-2 py-1 hover:border-white/40"
                                                >
                                                    <Icon name="calendar-plus" size={12} /> Zum Android-Kalender (.ics)
                                                </button>
                                            )}
                                        </div>
                                    ))}
                                </div>
                            )}
                        </div>
                    </section>

                    <div className="space-y-4">
                        {filteredApps.length === 0 && <div className="text-center py-20 text-brand-muted italic">Keine Einträge gefunden.</div>}
                        {filteredApps.map(app => (
                            <div key={app.id} className="glass-card p-6 rounded relative overflow-hidden group">
                                <div className={`status-indicator ${
                                    app.status === 'offen' ? 'bg-blue-500' : 
                                    app.status === 'absage' ? 'bg-red-500' : 'bg-yellow-500'
                                }`}></div>
                                
                                <div className="flex flex-col md:flex-row justify-between gap-6">
                                    <div className="flex-1">
                                        <div className="flex items-center gap-3 mb-2">
                                            <span className="text-[10px] font-bold uppercase tracking-widest text-brand-muted">
                                                {new Date(app.dateApplied).toLocaleDateString('de-DE')}
                                            </span>
                                            <span className={`text-[9px] px-1.5 py-0.5 rounded font-bold uppercase ${
                                                app.status === 'offen' ? 'bg-blue-500/10 text-blue-400' : 
                                                app.status === 'absage' ? 'bg-red-500/10 text-red-400' : 'bg-yellow-500/10 text-yellow-400'
                                            }`}>
                                                {app.status}
                                            </span>
                                        </div>
                                        
                                        <h3 className="text-xl font-bold text-white group-hover:text-blue-400 transition-colors mb-1 flex items-center gap-3">
                                            {app.jobTitle}
                                            {app.isTempWork && (
                                                <span className="flex items-center gap-1 text-[10px] bg-red-500/10 text-red-500 border border-red-500/20 px-2 py-0.5 rounded uppercase tracking-tighter">
                                                    <Icon name="alert-circle" size={12} className="text-red-500" />
                                                    Zeitarbeit
                                                </span>
                                            )}
                                        </h3>
                                        <p className="text-lg text-brand-accent/80 font-medium mb-4">{app.company}</p>
                                        
                                        <div className="grid grid-cols-1 md:grid-cols-3 gap-4 text-sm">
                                            <div className="flex items-center gap-2 text-brand-muted">
                                                <Icon name="link" size={14} />
                                                <PlatformLink value={app.platform} />
                                            </div>
                                            {app.salary && (
                                                <div className="flex items-center gap-2 text-brand-muted">
                                                    <Icon name="banknote" size={14} className="text-green-500/60" />
                                                    <span className="text-green-400/80 font-medium">{app.salary}</span>
                                                </div>
                                            )}
                                            {(app.shifts.morning || app.shifts.late || app.shifts.night) && (
                                                <div className="flex items-center gap-2 text-brand-muted">
                                                    <Icon name="clock" size={14} />
                                                    <span className="text-xs">
                                                        {[app.shifts.morning && 'Früh', app.shifts.late && 'Spät', app.shifts.night && 'Nacht'].filter(Boolean).join('/')}
                                                    </span>

        function HistoryModal({ onClose, app }) {
