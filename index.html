        function Modal({ onClose, onSave, initialData, API_BASE }) {
            const [form, setForm] = useState(initialData || {
                company: '', jobTitle: '', dateApplied: new Date().toISOString().split('T')[0],
                platform: '', salary: '', hourlyWage: 0, isTempWork: false,
                shifts: { morning: false, late: false, night: false },
                status: 'offen', statusDetail: 'vorstellungsgespräch', statusDate: '', statusText: '',
                pdfPath: ''
            });

            const [isExtracting, setIsExtracting] = useState(false);

            useEffect(() => {
                if (form.hourlyWage > 0) {
                    const factor = form.isTempWork ? 7 : 7.5;
                    const monthly = (form.hourlyWage * factor * 5 * 4).toFixed(2);
                    setForm(p => ({ ...p, salary: monthly + " € Brutto" }));
                }
            }, [form.hourlyWage, form.isTempWork]);

            const handleChange = (e) => {
                const { name, value, type, checked } = e.target;
                if (name.startsWith('shift_')) {
                    const s = name.split('_')[1];
                    setForm(p => ({ ...p, shifts: { ...p.shifts, [s]: checked } }));
                } else if (type === 'checkbox') {
                    setForm(p => ({ ...p, [name]: checked }));
                } else {
                    setForm(p => ({ ...p, [name]: value }));
                }
            };

            const handlePdf = async (e) => {
                const file = e.target.files[0];
                if (!file) return;
                setIsExtracting(true);
                const fd = new FormData();
                fd.append("file", file);
                try {
                    const res = await fetch(`${API_BASE}/extract`, { method: "POST", body: fd });
                    const data = await res.json();
                    setForm(p => ({ ...p, company: data.company, jobTitle: data.jobTitle, pdfPath: data.pdfPath }));
                } catch (err) { alert("Analyse fehlgeschlagen"); }
                setIsExtracting(false);
            };

            return (
                <div className="fixed inset-0 z-50 flex items-center justify-center p-4 bg-black/90 backdrop-blur-md">
                    <div className="glass-card w-full max-w-2xl max-h-[90vh] overflow-y-auto rounded-lg p-10 custom-scrollbar">
                        <h2 className="text-xl font-bold uppercase tracking-widest mb-10 border-b border-brand-border pb-4">
                            {initialData ? 'Eintrag bearbeiten' : 'Aktivität Erfassen'}
                        </h2>

                        {!initialData && (
                            <div className="mb-10 p-8 border-2 border-dashed border-brand-border rounded hover:border-brand-muted transition-colors relative flex flex-col items-center gap-3">
                                <Icon name={isExtracting ? "loader" : "plus-square"} className={isExtracting ? 'animate-spin text-white' : 'text-brand-muted'} size={32} />
                                <span className="text-[10px] font-bold uppercase tracking-wider text-brand-muted">{isExtracting ? "Analysiere PDF..." : "Bewerbungs-PDF für Auto-Erfassung"}</span>
                                <input type="file" accept=".pdf" onChange={handlePdf} className="absolute inset-0 opacity-0 cursor-pointer" />
                            </div>
                        )}

                        <form onSubmit={(e) => { e.preventDefault(); onSave(form); }} className="space-y-8">
                            <div className="grid grid-cols-1 md:grid-cols-2 gap-6">
                                <div className="space-y-2">
                                    <label className="text-[10px] font-bold uppercase tracking-widest text-brand-muted">Firma</label>
                                    <input required name="company" value={form.company} onChange={handleChange} className="input-premium w-full p-3 rounded" />
                                </div>
                                <div className="space-y-2">
                                    <label className="text-[10px] font-bold uppercase tracking-widest text-brand-muted">Stelle</label>
                                    <input required name="jobTitle" value={form.jobTitle} onChange={handleChange} className="input-premium w-full p-3 rounded" />
                                </div>
                                <div className="space-y-2">
                                    <label className="text-[10px] font-bold uppercase tracking-widest text-brand-muted">Datum</label>
                                    <input required type="date" name="dateApplied" value={form.dateApplied} onChange={handleChange} className="input-premium w-full p-3 rounded" />
                                </div>
                                <div className="space-y-2">
                                    <label className="text-[10px] font-bold uppercase tracking-widest text-brand-muted">Quelle / Link</label>
                                    <input name="platform" value={form.platform} onChange={handleChange} className="input-premium w-full p-3 rounded" placeholder="z.B. www.indeed.de" />
                                </div>
                            </div>

                            <div className="p-6 bg-white/5 rounded border border-brand-border space-y-6">
                                <div className="grid grid-cols-1 md:grid-cols-2 gap-6">
                                    <div className="space-y-2">
                                        <label className="text-[10px] font-bold uppercase tracking-widest text-brand-muted">Stundenlohn (€)</label>
                                        <input type="number" step="0.01" name="hourlyWage" value={form.hourlyWage} onChange={e => setForm(p => ({...p, hourlyWage: parseFloat(e.target.value) || 0}))} className="input-premium w-full p-3 rounded" />
                                    </div>
                                    <div className="flex items-center pt-6">
                                        <label className="flex items-center gap-3 cursor-pointer text-[10px] font-bold uppercase text-brand-muted">
                                            <input type="checkbox" name="isTempWork" checked={form.isTempWork} onChange={handleChange} className="w-4 h-4 rounded bg-brand-bg border-brand-border" /> Zeitarbeit (-0.5h/Tag)
                                        </label>
                                    </div>
                                </div>
                                <div className="space-y-2">
                                    <label className="text-[10px] font-bold uppercase tracking-widest text-brand-muted">Berechnetes Gehalt (Monat)</label>
                                    <input name="salary" value={form.salary} onChange={handleChange} className="input-premium w-full p-3 rounded font-bold text-green-400" />
                                </div>
                            </div>

                            <div className="grid grid-cols-1 md:grid-cols-3 gap-4 border-t border-brand-border pt-6">
                                <label className="flex items-center gap-2 cursor-pointer text-[10px] font-bold uppercase text-brand-muted">
                                    <input type="checkbox" name="shift_morning" checked={form.shifts.morning} onChange={handleChange} /> Frühschicht
                                </label>
                                <label className="flex items-center gap-2 cursor-pointer text-[10px] font-bold uppercase text-brand-muted">
                                    <input type="checkbox" name="shift_late" checked={form.shifts.late} onChange={handleChange} /> Spätschicht
                                </label>
                                <label className="flex items-center gap-2 cursor-pointer text-[10px] font-bold uppercase text-brand-muted">
                                    <input type="checkbox" name="shift_night" checked={form.shifts.night} onChange={handleChange} /> Nachtschicht
                                </label>
                            </div>

                            <div className="space-y-6 border-t border-brand-border pt-8">
                                <div className="grid grid-cols-1 md:grid-cols-2 gap-6">
                                    <div className="space-y-2">
                                        <label className="text-[10px] font-bold uppercase tracking-widest text-brand-muted">Aktueller Status</label>
                                        <select name="status" value={form.status} onChange={handleChange} className="input-premium w-full p-3 rounded cursor-pointer">
                                            <option value="offen">Warten auf Antwort</option>
                                            <option value="gemeldet">Rückmeldung / Termin</option>
                                            <option value="absage">Absage</option>
                                        </select>
                                    </div>
                                    {form.status !== 'offen' && (
                                        <div className="space-y-2">
                                            <label className="text-[10px] font-bold uppercase tracking-widest text-brand-muted">Termin / Datum</label>
                                            <input type="date" name="statusDate" value={form.statusDate} onChange={handleChange} className="input-premium w-full p-3 rounded" />
                                        </div>
                                    )}
                                </div>
                                {form.status !== 'offen' && (
                                    <div className="grid grid-cols-1 md:grid-cols-2 gap-6">
                                        <div className="space-y-2">
                                            <label className="text-[10px] font-bold uppercase tracking-widest text-brand-muted">Art (z.B. Telefonat)</label>
                                            <input name="statusDetail" value={form.statusDetail} onChange={handleChange} className="input-premium w-full p-3 rounded" />
                                        </div>
                                        <div className="space-y-2">
                                            <label className="text-[10px] font-bold uppercase tracking-widest text-brand-muted">Bemerkung</label>
                                            <input name="statusText" value={form.statusText} onChange={handleChange} className="input-premium w-full p-3 rounded" />
                                        </div>
                                    </div>
                                )}
                            </div>

                            <div className="flex justify-end gap-4 pt-4">
                                <button type="button" onClick={onClose} className="px-8 py-3 rounded text-[10px] font-bold uppercase hover:bg-white/5 transition-colors">Abbrechen</button>
                                <button type="submit" className="btn-premium px-10 py-3 rounded text-[10px] font-bold uppercase tracking-widest">Speichern</button>
                            </div>
                        </form>
                    </div>
                </div>
            );
        }

        function CoverLetterStudio({ API_BASE, Icon }) {
            const emptyContext = { company: "", role: "", tasks: "", experiences: "", liked: "", disliked: "", atmosphere: "", notes: "" };
            const [projects, setProjects] = useState([]);
            const [projectId, setProjectId] = useState("");
            const [profiles, setProfiles] = useState([]);
            const [selectedProfileId, setSelectedProfileId] = useState("");
            const [profileName, setProfileName] = useState("");
            const [projectData, setProjectData] = useState(null);
            const [sourceType, setSourceType] = useState("link");
            const [sourceValue, setSourceValue] = useState("");
            const [contactPerson, setContactPerson] = useState("");
            const [baselineText, setBaselineText] = useState("");
            const [baselineFile, setBaselineFile] = useState(null);
            const [resumeText, setResumeText] = useState("");
            const [resumeFile, setResumeFile] = useState(null);
            const [contextEntries, setContextEntries] = useState([{ ...emptyContext }]);
            const [feedback, setFeedback] = useState("");
            const [targetScore, setTargetScore] = useState(9);
            const [maxRounds, setMaxRounds] = useState(6);
            const [jobConfirmed, setJobConfirmed] = useState(false);
            const [resumeConfirmed, setResumeConfirmed] = useState(false);
            const [showValidationErrors, setShowValidationErrors] = useState(false);
            const [busy, setBusy] = useState(false);
            const [message, setMessage] = useState("");

            useEffect(() => {
                loadProjects();
                loadProfiles();
            }, []);

            const loadProfiles = async () => {
                try {
                    const res = await fetch(`${API_BASE}/profiles`);
                    const data = await res.json();
                    setProfiles(data.profiles || []);
                } catch (_err) { setProfiles([]); }
            };

            const saveCurrentAsProfile = async () => {
                if (!profileName.trim()) {
                    setMessage("Bitte einen Namen für das Profil vergeben.");
                    return;
                }
                await withBusy(async () => {
                    const res = await fetch(`${API_BASE}/profiles`, {
                        method: "POST",
                        headers: { "Content-Type": "application/json" },
                        body: JSON.stringify({
                            profileName,
                            resumeText,
                            baselineLetter: baselineText,
                            contextEntries: contextEntries
                        })
                    });
                    if (!res.ok) throw new Error("Profil konnte nicht gespeichert werden.");
                    await loadProfiles();
                    setMessage("Profil erfolgreich gespeichert.");
                    setProfileName("");
                });
            };

            const applyProfile = async (profileId) => {
                await withBusy(async () => {
                    if (!projectId) {
                        const profileRes = await fetch(`${API_BASE}/profiles/${profileId}`);
                        const profileData = await profileRes.json();
                        if (!profileRes.ok) throw new Error(profileData.detail || "Profil konnte nicht geladen werden.");

                        setResumeText(profileData.resumeText || "");
                        setBaselineText(profileData.baselineLetter || "");
                        if (Array.isArray(profileData.contextEntries) && profileData.contextEntries.length > 0) {
                            setContextEntries(profileData.contextEntries.map(entry => ({
                                company: entry.company || "",
                                role: entry.role || "",
                                tasks: entry.tasks || "",
                                experiences: entry.experiences || "",
                                liked: entry.liked || "",
                                disliked: entry.disliked || "",
                                atmosphere: entry.atmosphere || "",
                                notes: entry.notes || "",
                            })));
                        } else {
                            setContextEntries([{ ...emptyContext }]);
                        }

                        setMessage("Profil geladen. Bitte jetzt ein Projekt auswählen oder erstellen.");
                        return;
                    }

                    const res = await fetch(`${API_BASE}/cover-letter/projects/${projectId}/apply-profile/${profileId}`, {
                        method: "POST"
                    });
                    const data = await res.json();
                    if (!res.ok) throw new Error(data.detail || "Profil konnte nicht geladen werden.");
                    syncFromPayload(data);

                    // Sync local form states
                    setResumeText(data.sources?.resumeText || "");
                    setBaselineText(data.sources?.baselineLetter || "");
                    setMessage("Profil erfolgreich in das Projekt geladen.");
                });
            };

            const deleteProfile = async (id) => {
                if (!confirm("Profil wirklich löschen?")) return;
                await withBusy(async () => {
                    await fetch(`${API_BASE}/profiles/${id}`, { method: "DELETE" });
                    await loadProfiles();
                    setMessage("Profil gelöscht.");
                });
            };

            const loadProjects = async () => {
                try {
                    const res = await fetch(`${API_BASE}/cover-letter/projects`);
                    const data = await res.json();
                    setProjects(data.projects || []);
                } catch (_err) {
                    setProjects([]);
                }
            };

            const syncFromPayload = (data) => {
                if (!data || !data.project) return;
                setProjectId(data.project.id);
                setProjectData(data);
                
                // Grunddaten des Projekts
                setTargetScore(data.project.targetScore || 9);
                setMaxRounds(data.project.maxRounds || 6);
                setFeedback(data.project.latestFeedback || "");

                // Quellen-Daten (Job, Anschreiben, Lebenslauf)
                const sources = data.sources || {};
                setSourceType(sources.jobSourceType || "link");
                setSourceValue(sources.jobSourceValue || "");
                
                // Ansprechpartner aus der Job-Analyse
                const analysis = sources.jobAnalysis || {};
                setContactPerson(analysis.contactPerson || "");

                // Texte aus den Sektionen 2 und 3
                setBaselineText(sources.baselineLetter || "");
                setResumeText(sources.resumeText || "");

                // Kontext-Einträge aus Sektion 4
                if (Array.isArray(data.resumeContextEntries)) {
                    if (data.resumeContextEntries.length > 0) {
                        setContextEntries(data.resumeContextEntries.map(entry => ({
                            company: entry.company || "",
                            role: entry.role || "",
                            tasks: entry.tasks || "",
                            experiences: entry.experiences || "",
                            liked: entry.liked || "",
                            disliked: entry.disliked || "",
                            atmosphere: entry.atmosphere || "",
                            notes: entry.notes || "",
                        })));
                    } else {
                        setContextEntries([{ ...emptyContext }]);
                    }
                }
            };

            const withBusy = async (fn) => {
                setBusy(true);
                setMessage("");
                try {
                    await fn();
                } catch (err) {
                    // Versuche die Fehlermeldung vom Backend zu extrahieren
                    let errMsg = err.message || "Aktion fehlgeschlagen.";
                    if (err.response && err.response.json) {
                        try {
                            const data = await err.response.json();
                            errMsg = data.detail || errMsg;
                        } catch(e) {}
                    }
                    setMessage(errMsg);
                } finally {
                    setBusy(false);
                }
            };

            const createProject = async () => {
                await withBusy(async () => {
                    const res = await fetch(`${API_BASE}/cover-letter/projects`, {
                        method: "POST",
                        headers: { "Content-Type": "application/json" },
                        body: JSON.stringify({ targetScore, maxRounds })
                    });
                    const data = await res.json();
                    if (!res.ok) throw new Error(data.detail || "Projekt konnte nicht erstellt werden.");
                    syncFromPayload(data);
                    await loadProjects();
                    setMessage("Projekt erstellt.");
                });
            };

            const openProject = async (id) => {
                await withBusy(async () => {
                    const res = await fetch(`${API_BASE}/cover-letter/projects/${id}`);
                    const data = await res.json();
                    if (!res.ok) throw new Error(data.detail || "Projekt konnte nicht geladen werden.");
                    syncFromPayload(data);
                    setMessage("Projekt geladen.");
                });
            };

            const saveJobSource = async () => {
                if (!projectId) {
                    setMessage("Bitte zuerst ein Projekt erstellen.");
                    return;
                }
                if (!sourceValue.trim()) {
                    setMessage("Bitte Stellenlink oder Text eintragen.");
                    return;
                }
                await withBusy(async () => {
                    const res = await fetch(`${API_BASE}/cover-letter/projects/${projectId}/job-source`, {
                        method: "POST",
                        headers: { "Content-Type": "application/json" },
                        body: JSON.stringify({ sourceType, sourceValue, contactPerson })
                    });
                    const data = await res.json();
                    if (!res.ok) throw new Error(data.detail || "Jobquelle konnte nicht gespeichert werden.");
                    syncFromPayload(data);

                    if (sourceType === "link") {
                        const analyzeRes = await fetch(`${API_BASE}/cover-letter/projects/${projectId}/analyze-job-link`, {
                            method: "POST",
                            headers: { "Content-Type": "application/json" },
                            body: JSON.stringify({})
                        });
                        const analyzeData = await analyzeRes.json();
                        if (!analyzeRes.ok) throw new Error(analyzeData.detail || "Linkanalyse fehlgeschlagen.");
                        syncFromPayload(analyzeData);
                    }
                    setJobConfirmed(false);
                    setMessage("Stellenquelle gespeichert und analysiert.");
                });
            };

            const analyzeStoredLink = async () => {
                if (!projectId) {
                    setMessage("Bitte zuerst ein Projekt erstellen.");
                    return;
                }
                await withBusy(async () => {
                    const res = await fetch(`${API_BASE}/cover-letter/projects/${projectId}/analyze-job-link`, {
                        method: "POST",
                        headers: { "Content-Type": "application/json" },
                        body: JSON.stringify({})
                    });
                    const data = await res.json();
                    if (!res.ok) throw new Error(data.detail || "Linkanalyse fehlgeschlagen.");
                    syncFromPayload(data);
                    setJobConfirmed(false);
                    setMessage("Stellenanalyse aktualisiert.");
                });
            };

            const saveBaseline = async () => {
                if (!projectId) {
                    setMessage("Bitte zuerst ein Projekt erstellen.");
                    return;
                }
                await withBusy(async () => {
                    const fd = new FormData();
                    if (baselineText.trim()) fd.append("text", baselineText);
                    if (baselineFile) fd.append("file", baselineFile);

                    const res = await fetch(`${API_BASE}/cover-letter/projects/${projectId}/baseline-letter`, {
                        method: "POST",
                        body: fd
                    });
                    const data = await res.json();
                    if (!res.ok) throw new Error(data.detail || "Anschreiben konnte nicht gespeichert werden.");
                    syncFromPayload(data);
                    setMessage("Bestehendes Anschreiben gespeichert.");
                });
            };

            const saveResume = async () => {
                if (!projectId) {
                    setMessage("Bitte zuerst ein Projekt erstellen.");
                    return;
                }
                await withBusy(async () => {
                    const fd = new FormData();
                    if (resumeText.trim()) fd.append("text", resumeText);
                    if (resumeFile) fd.append("file", resumeFile);

                    const res = await fetch(`${API_BASE}/cover-letter/projects/${projectId}/resume`, {
                        method: "POST",
                        body: fd
                    });
                    const data = await res.json();
                    if (!res.ok) throw new Error(data.detail || "Lebenslauf konnte nicht verarbeitet werden.");
                    syncFromPayload(data);
                    setResumeConfirmed(false);
                    setMessage("Lebenslauf gespeichert und aufbereitet.");
                });
            };

            const saveResumeContext = async () => {
                if (!projectId) {
                    setMessage("Bitte zuerst ein Projekt erstellen.");
                    return;
                }
                await withBusy(async () => {
                    const res = await fetch(`${API_BASE}/cover-letter/projects/${projectId}/resume-context`, {
                        method: "POST",
                        headers: { "Content-Type": "application/json" },
                        body: JSON.stringify({ entries: contextEntries })
                    });
                    const data = await res.json();
                    if (!res.ok) throw new Error(data.detail || "Lebenslauf-Kontext konnte nicht gespeichert werden.");
                    syncFromPayload(data);
                    setMessage("Lebenslauf-Kontext gespeichert.");
                });
            };

            const extractContextFromFile = async (file) => {
                if (!projectId) {
                    setMessage("Bitte zuerst ein Projekt erstellen.");
                    return;
                }
                if (!file) return;
                await withBusy(async () => {
                    const fd = new FormData();
                    fd.append("file", file);
                    const res = await fetch(`${API_BASE}/cover-letter/projects/${projectId}/resume-context-extract`, {
                        method: "POST",
                        body: fd
                    });
                    const data = await res.json();
                    if (!res.ok) throw new Error(data.detail || "Extraktion fehlgeschlagen.");
                    if (data.entries && data.entries.length > 0) {
                        setContextEntries(data.entries);
                        setMessage(`${data.entries.length} Stationen extrahiert. Bitte prüfen und speichern.`);
                    } else {
                        setMessage("Keine Stationen im Text erkannt.");
                    }
                });
            };

            const saveFeedback = async () => {
                if (!projectId || !feedback.trim()) {
                    setMessage("Bitte Projekt und Feedback angeben.");
                    return;
                }
                await withBusy(async () => {
                    const res = await fetch(`${API_BASE}/cover-letter/projects/${projectId}/feedback`, {
                        method: "POST",
                        headers: { "Content-Type": "application/json" },
                        body: JSON.stringify({ feedback })
                    });
                    const data = await res.json();
                    if (!res.ok) throw new Error(data.detail || "Feedback konnte nicht gespeichert werden.");
                    syncFromPayload(data);
                    setMessage("Feedback gespeichert.");
                });
            };

            const generateDraft = async () => {
                setShowValidationErrors(false);
                if (!projectId) {
                    setMessage("Bitte zuerst ein Projekt erstellen.");
                    return;
                }
                if (!jobConfirmed || !resumeConfirmed) {
                    setShowValidationErrors(true);
                    setMessage("Bitte die oben stehenden Häkchen bei Punkt 1) und 3) setzen, um zu bestätigen, dass die Daten korrekt sind.");
                    return;
                }
                await withBusy(async () => {
                    const res = await fetch(`${API_BASE}/cover-letter/projects/${projectId}/generate`, {
                        method: "POST",
                        headers: { "Content-Type": "application/json" },
                        body: JSON.stringify({ targetScore, maxRounds })
                    });
                    const data = await res.json();
                    if (!res.ok) throw new Error(data.detail || "Generierung fehlgeschlagen.");
                    syncFromPayload(data);
                    setMessage(`Anschreiben erstellt. Finaler Score: ${data.result?.finalScore ?? "-"}`);
                });
            };

            const iterateDraft = async () => {
                if (!projectId) {
                    setMessage("Bitte zuerst ein Projekt erstellen.");
                    return;
                }
                await withBusy(async () => {
                    const res = await fetch(`${API_BASE}/cover-letter/projects/${projectId}/iterate`, {
                        method: "POST",
                        headers: { "Content-Type": "application/json" },
                        body: JSON.stringify({ targetScore, maxRounds, feedback })
                    });
                    const data = await res.json();
                    if (!res.ok) throw new Error(data.detail || "Iteration fehlgeschlagen.");
                    syncFromPayload(data);
                    setMessage(`Iteration abgeschlossen. Finaler Score: ${data.result?.finalScore ?? "-"}`);
                });
            };

            const addContextEntry = () => setContextEntries(prev => [...prev, { ...emptyContext }]);
            const removeContextEntry = (idx) => setContextEntries(prev => prev.filter((_, i) => i !== idx));
            const setContextField = (idx, key, value) => {
                setContextEntries(prev => prev.map((entry, i) => i === idx ? { ...entry, [key]: value } : entry));
            };

            const exportTxt = () => {
                if (!projectId) {
                    setMessage("Bitte zuerst ein Projekt erstellen.");
                    return;
                }
                window.open(`${API_BASE}/cover-letter/projects/${projectId}/export/txt`, "_blank");
            };

            const analysis = projectData?.sources?.jobAnalysis || {};
            const resumeSummary = projectData?.sources?.resumeSummary || {};
            const iterations = projectData?.iterations || [];
            const latestDraft = projectData?.project?.latestDraft || "";
            const latestScore = projectData?.project?.latestScore || 0;

            return (
                <div className="space-y-8">
                    <section className="glass-card p-6 rounded-lg space-y-4">
                        <h2 className="text-sm font-bold uppercase tracking-widest text-brand-muted flex items-center gap-2">
                            <Icon name="user" size={16} /> 0) Bewerberprofil (Lebenslauf-Vorlagen)
                        </h2>
                        <div className="grid grid-cols-1 md:grid-cols-4 gap-3 items-end">
                            <div className="md:col-span-2 space-y-1">
                                <label className="text-[10px] font-bold uppercase tracking-widest text-brand-muted">Profil laden</label>
                                <div className="flex gap-2">
                                    <select 
                                        value={selectedProfileId} 
                                        onChange={e => setSelectedProfileId(e.target.value)}
                                        className="input-premium flex-1 p-2 rounded text-sm"
                                    >
                                        <option value="">Profil wählen...</option>
                                        {profiles.map(p => (
                                            <option key={p.id} value={p.id}>{p.profileName} ({new Date(p.updatedAt).toLocaleDateString()})</option>
                                        ))}
                                    </select>
                                    <button 
                                        disabled={!selectedProfileId || busy} 
                                        onClick={() => applyProfile(selectedProfileId)}
                                        className="glass-card px-4 py-2 rounded text-xs uppercase tracking-wide flex items-center gap-2"
                                    >
                                        <Icon name="download" size={14} /> Laden
                                    </button>
                                    <button 
                                        disabled={!selectedProfileId || busy} 
                                        onClick={() => deleteProfile(selectedProfileId)}
                                        className="glass-card px-2 py-2 rounded text-xs uppercase text-red-400 hover:text-red-300"
                                    >
                                        <Icon name="trash-2" size={14} />
                                    </button>
                                </div>
                            </div>
                            <div className="md:col-span-2 space-y-1">
                                <label className="text-[10px] font-bold uppercase tracking-widest text-brand-muted">Aktuellen Stand als Profil speichern</label>
                                <div className="flex gap-2">
                                    <input 
                                        value={profileName}
                                        onChange={e => setProfileName(e.target.value)}
                                        placeholder="Name (z.B. IT-Systemhaus)" 
                                        className="input-premium flex-1 p-2 rounded text-sm" 
                                    />
                                    <button 
                                        disabled={busy} 
                                        onClick={saveCurrentAsProfile}
                                        className="btn-premium px-4 py-2 rounded text-xs uppercase tracking-wide flex items-center gap-2"
                                    >
                                        <Icon name="save" size={14} /> Speichern
                                    </button>
                                </div>
                            </div>
                        </div>
                    </section>

                    <section className="glass-card p-6 rounded-lg space-y-4">
                        <h2 className="text-sm font-bold uppercase tracking-widest text-brand-muted flex items-center gap-2">
                            <Icon name="sparkles" size={16} /> KI Anschreiben Studio
                        </h2>
                        <div className="grid grid-cols-1 md:grid-cols-4 gap-3 items-end">
                            <div className="space-y-1">
                                <label className="text-[10px] font-bold uppercase tracking-widest text-brand-muted">Ziel-Qualität (1-10)</label>
                                <input
                                    type="number"
                                    min="1"
                                    max="10"
                                    step="0.1"
                                    value={targetScore}
                                    onChange={e => setTargetScore(parseFloat(e.target.value) || 9)}
                                    className="input-premium w-full p-2 rounded text-sm"
                                    placeholder="Zielscore"
                                />
                            </div>
                            <div className="space-y-1">
                                <label className="text-[10px] font-bold uppercase tracking-widest text-brand-muted">KI-Überarbeitungsrunden</label>
                                <input
                                    type="number"
                                    min="1"
                                    max="20"
                                    value={maxRounds}
                                    onChange={e => setMaxRounds(parseInt(e.target.value, 10) || 6)}
                                    className="input-premium w-full p-2 rounded text-sm"
                                    placeholder="Max Runden"
                                />
                            </div>
                            <button onClick={createProject} className="btn-premium px-4 py-2 h-[38px] rounded text-xs uppercase tracking-wide">Neues Projekt</button>
                            <button onClick={loadProjects} className="glass-card px-4 py-2 h-[38px] rounded text-xs uppercase tracking-wide">Projekte laden</button>
                        </div>
                        <div className="flex flex-wrap gap-2">
                            {projects.map(p => (
                                <button
                                    key={p.id}
                                    onClick={() => openProject(p.id)}
                                    className={`px-3 py-1.5 rounded text-xs border ${projectId === p.id ? 'border-white text-white' : 'border-brand-border text-brand-muted hover:text-white'}`}
                                >
                                    {(p.projectLabel || `Projekt ${p.id.slice(0, 8)}`)} • Score {Number(p.latestScore || 0).toFixed(1)}
                                </button>
                            ))}
                        </div>
                        {projectId && <div className="text-xs text-brand-muted">Aktives Projekt: {(projects.find(p => p.id === projectId)?.projectLabel) || projectId}</div>}
                        {message && <div className="text-xs text-blue-300">{message}</div>}
                    </section>

                    <section className="glass-card p-6 rounded-lg space-y-4">
                        <h3 className="text-xs font-bold uppercase tracking-widest text-brand-muted">1) Stelle und Unternehmenskontext</h3>
                        <div className="grid grid-cols-1 md:grid-cols-4 gap-3">
                            <select value={sourceType} onChange={e => setSourceType(e.target.value)} className="input-premium p-2 rounded text-sm">
                                <option value="link">Link</option>
                                <option value="text">Anzeigentext</option>
                            </select>
                            <input
                                value={sourceValue}
                                onChange={e => setSourceValue(e.target.value)}
                                className="input-premium p-2 rounded text-sm md:col-span-2"
                                placeholder={sourceType === 'link' ? 'https://...' : 'Text aus der Stellenanzeige einfügen'}
                            />
                            <div className="flex flex-col space-y-1">
                                <label className="text-[10px] font-bold uppercase tracking-widest text-brand-muted">Ansprechpartner (optional)</label>
                                <input 
                                    value={contactPerson}
                                    onChange={e => setContactPerson(e.target.value)}
                                    placeholder="z.B. Frau Müller"
                                    className="input-premium p-2 rounded text-sm"
                                />
                            </div>
                            <button disabled={busy} onClick={saveJobSource} className="btn-premium px-4 py-2 rounded text-xs uppercase tracking-wide">
                                Quelle & Name speichern
                            </button>
                        </div>
                        <button disabled={busy || !projectId} onClick={analyzeStoredLink} className="glass-card px-4 py-2 rounded text-xs uppercase tracking-wide">
                            Linkanalyse erneut ausführen
                        </button>
                        <div className="p-3 rounded border border-brand-border bg-white/5 text-sm space-y-1">
                            <div><strong>Firma:</strong> {analysis.companyName || "-"}</div>
                            <div><strong>Stelle:</strong> {analysis.jobTitle || "-"}</div>
                            <div><strong>Ansprechpartner:</strong> {analysis.contactPerson || "Damen und Herren (Fallback)"}</div>
                            <div><strong>Kundentyp:</strong> {analysis.isTempWork ? "Zeitarbeit" : "Reguläre Firma/Unklar"}</div>
                            <div><strong>Kunden:</strong> {analysis.customers || "-"}</div>
                            <div><strong>Unternehmensprofil:</strong> {analysis.companySummary || "-"}</div>
                            <div><strong>Anforderungen:</strong> {(analysis.requirements || []).join(" | ") || "-"}</div>
                        </div>
                        <label className={`flex items-center gap-2 text-xs p-2 rounded transition-colors ${showValidationErrors && !jobConfirmed ? 'bg-red-500/20 border border-red-500 text-red-200' : 'text-brand-muted'}`}>
                            <input type="checkbox" checked={jobConfirmed} onChange={e => setJobConfirmed(e.target.checked)} />
                            Analyse geprüft und bestätigt
                        </label>
                    </section>

                    <section className="glass-card p-6 rounded-lg space-y-4">
                        <h3 className="text-xs font-bold uppercase tracking-widest text-brand-muted">2) Bisheriges Anschreiben</h3>
                        <textarea value={baselineText} onChange={e => setBaselineText(e.target.value)} rows="6" className="input-premium w-full p-3 rounded text-sm" placeholder="Bestehendes Anschreiben hier einfügen..." />
                        <input type="file" accept=".txt" onChange={e => setBaselineFile(e.target.files?.[0] || null)} className="text-xs text-brand-muted" />
                        <button disabled={busy || !projectId} onClick={saveBaseline} className="btn-premium px-4 py-2 rounded text-xs uppercase tracking-wide">
                            Anschreiben speichern
                        </button>
                    </section>

                    <section className="glass-card p-6 rounded-lg space-y-4">
                        <h3 className="text-xs font-bold uppercase tracking-widest text-brand-muted">3) Lebenslauf + Sichtkontrolle</h3>
                        <textarea value={resumeText} onChange={e => setResumeText(e.target.value)} rows="6" className="input-premium w-full p-3 rounded text-sm" placeholder="Lebenslauftext hier einfügen..." />
                        <input type="file" accept=".txt,.pdf" onChange={e => setResumeFile(e.target.files?.[0] || null)} className="text-xs text-brand-muted" />
                        <button disabled={busy || !projectId} onClick={saveResume} className="btn-premium px-4 py-2 rounded text-xs uppercase tracking-wide">
                            Lebenslauf verarbeiten
                        </button>
                        <div className="p-3 rounded border border-brand-border bg-white/5 text-sm space-y-1">
                            <div><strong>Zeichen:</strong> {resumeSummary.characterCount || 0}</div>
                            <div><strong>Stationen:</strong> {(resumeSummary.stationHints || []).join(" | ") || "-"}</div>
                            <div><strong>Skills:</strong> {(resumeSummary.skills || []).join(", ") || "-"}</div>
                        </div>
                        <label className={`flex items-center gap-2 text-xs p-2 rounded transition-colors ${showValidationErrors && !resumeConfirmed ? 'bg-red-500/20 border border-red-500 text-red-200' : 'text-brand-muted'}`}>
                            <input type="checkbox" checked={resumeConfirmed} onChange={e => setResumeConfirmed(e.target.checked)} />
                            Lebenslaufdaten geprüft und bestätigt
                        </label>
                    </section>

                    <section className="glass-card p-6 rounded-lg space-y-4">
                        <h3 className="text-xs font-bold uppercase tracking-widest text-brand-muted">4) Kontext pro Station</h3>
                        
                        <div className="p-4 border-2 border-dashed border-brand-border rounded hover:border-brand-muted transition-colors relative flex flex-col items-center gap-2 mb-4">
                            <Icon name="file-text" size={24} className="text-brand-muted" />
                            <span className="text-[10px] font-bold uppercase tracking-wider text-brand-muted">Erfahrungen aus .txt oder .pdf Datei extrahieren</span>
                            <input 
                                type="file" 
                                accept=".txt,.pdf" 
                                onChange={e => extractContextFromFile(e.target.files[0])} 
                                className="absolute inset-0 opacity-0 cursor-pointer" 
                            />
                        </div>

                        <div className="space-y-3">
                            {contextEntries.map((entry, idx) => (
                                <div key={idx} className="p-3 rounded border border-brand-border bg-white/5 space-y-2">
                                    <div className="flex justify-between items-center">
                                        <div className="text-xs font-bold uppercase text-brand-muted">Station {idx + 1}</div>
                                        {contextEntries.length > 1 && (
                                            <button onClick={() => removeContextEntry(idx)} className="text-xs text-red-400 hover:text-red-300">Entfernen</button>
                                        )}
                                    </div>
                                    <div className="grid grid-cols-1 md:grid-cols-2 gap-2">
                                        <input value={entry.company} onChange={e => setContextField(idx, "company", e.target.value)} className="input-premium p-2 rounded text-sm" placeholder="Firma" />
                                        <input value={entry.role} onChange={e => setContextField(idx, "role", e.target.value)} className="input-premium p-2 rounded text-sm" placeholder="Rolle" />
                                        <input value={entry.tasks} onChange={e => setContextField(idx, "tasks", e.target.value)} className="input-premium p-2 rounded text-sm" placeholder="Aufgaben" />
                                        <input value={entry.experiences} onChange={e => setContextField(idx, "experiences", e.target.value)} className="input-premium p-2 rounded text-sm" placeholder="Erlebnisse" />
                                        <input value={entry.liked} onChange={e => setContextField(idx, "liked", e.target.value)} className="input-premium p-2 rounded text-sm" placeholder="Was hat Spaß gemacht?" />
                                        <input value={entry.disliked} onChange={e => setContextField(idx, "disliked", e.target.value)} className="input-premium p-2 rounded text-sm" placeholder="Was war schwierig?" />
                                        <input value={entry.atmosphere} onChange={e => setContextField(idx, "atmosphere", e.target.value)} className="input-premium p-2 rounded text-sm" placeholder="Atmosphäre" />
                                        <input value={entry.notes} onChange={e => setContextField(idx, "notes", e.target.value)} className="input-premium p-2 rounded text-sm" placeholder="Sonstige Notizen" />
                                    </div>
                                </div>
                            ))}
                        </div>
                        <div className="flex gap-2">
                            <button onClick={addContextEntry} className="glass-card px-4 py-2 rounded text-xs uppercase tracking-wide">Station hinzufügen</button>
                            <button disabled={busy || !projectId} onClick={saveResumeContext} className="btn-premium px-4 py-2 rounded text-xs uppercase tracking-wide">Kontext speichern</button>
                        </div>
                    </section>

                    <section className="glass-card p-6 rounded-lg space-y-4">
                        <h3 className="text-xs font-bold uppercase tracking-widest text-brand-muted">5) Generierung, Feedback, Iteration</h3>
                        <textarea value={feedback} onChange={e => setFeedback(e.target.value)} rows="4" className="input-premium w-full p-3 rounded text-sm" placeholder="Feedback oder zusätzliche Vorgaben..." />
                        <div className="flex flex-wrap gap-2">
                            <button disabled={busy || !projectId} onClick={saveFeedback} className="glass-card px-4 py-2 rounded text-xs uppercase tracking-wide">Feedback speichern</button>
                            <button disabled={busy || !projectId} onClick={generateDraft} className="btn-premium px-4 py-2 rounded text-xs uppercase tracking-wide">Anschreiben generieren</button>
                            <button disabled={busy || !projectId} onClick={iterateDraft} className="btn-premium px-4 py-2 rounded text-xs uppercase tracking-wide">Auto-Iteration starten</button>
                            <button disabled={!projectId} onClick={exportTxt} className="glass-card px-4 py-2 rounded text-xs uppercase tracking-wide">TXT exportieren</button>
                        </div>
                        <div className="text-xs text-brand-muted">Finaler Score: {Number(latestScore || 0).toFixed(2)}</div>
                        <textarea readOnly value={latestDraft} rows="10" className="input-premium w-full p-3 rounded text-sm" placeholder="Hier erscheint das aktuelle Anschreiben..." />
                    </section>

                    <section className="glass-card p-6 rounded-lg space-y-3">
                        <h3 className="text-xs font-bold uppercase tracking-widest text-brand-muted">6) Iterationsverlauf</h3>
                        {iterations.length === 0 ? (
                            <div className="text-sm text-brand-muted italic">Noch keine Iterationen vorhanden.</div>
                        ) : (
                            <div className="space-y-2">
                                {iterations.slice().reverse().map((it) => (
                                    <div key={it.id} className="p-3 rounded border border-brand-border bg-white/5">
                                        <div className="text-xs text-brand-muted mb-1">Runde {it.roundIndex} • Score {Number(it.scoreTotal || 0).toFixed(2)}</div>
                                        <div className="text-sm text-white mb-1">{it.rationale || "-"}</div>
                                        <div className="text-xs text-brand-muted">
                                            Verbesserungen: {(it.improvementHints || []).join(" | ") || "-"}
                                        </div>
                                    </div>
                                ))}
                            </div>
                        )}
                    </section>

                    {busy && (
                        <div className="fixed inset-0 z-[100] flex flex-col items-center justify-center bg-black/80 backdrop-blur-sm transition-opacity">
                            <div className="w-64 space-y-4 text-center">
                                <div className="relative h-1 w-full bg-brand-border rounded-full overflow-hidden">
                                    <div className="absolute inset-0 bg-white animate-[loading_2s_infinite_linear]" style={{ width: '50%', backgroundSize: '200% 100%' }}></div>
                                </div>
                                <div className="text-xs font-bold uppercase tracking-[0.2em] text-white animate-pulse">KI generiert Anschreiben...</div>
                                <div className="text-[10px] text-brand-muted">Dieser Vorgang kann bis zu 60 Sekunden dauern</div>
                            </div>
                        </div>
                    )}
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
